name: Auto-Update Vault

on:
  schedule:
    - cron: '0 */6 * * *'   
  workflow_dispatch:
    inputs:
      query:
        description: 'GitHub search query'
        required: false
        default: 'topic:api'
        type: string
      max_results:
        description: 'Max results to fetch'
        required: false
        default: '100'
        type: string

jobs:
  update:
    concurrency:
      group: curation-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true
      
      - name: Type check with mypy
        run: mypy src/
        continue-on-error: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run curation script
        id: curation
        run: |
          python -m src.main --query "${QUERY_INPUT:-topic:api}" --max-results "${MAX_RESULTS_INPUT:-100}" | tee output.log
          SUMMARY_LINE=$(grep -oP '^SUMMARY:\K.*' output.log || echo "no changes")
          echo "summary=$SUMMARY_LINE" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUERY_INPUT: ${{ github.event.inputs.query }}
          MAX_RESULTS_INPUT: ${{ github.event.inputs.max_results }}
        continue-on-error: false

      - name: Check for changes and push
        id: push
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
          else
            SUMMARY="${{ steps.curation.outputs.summary }}"
            git add categories/ README.md cyber_vault.html
            git add -f apis.json categories.json
            git commit -m "chore: update vault (${SUMMARY})"
            git push
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const run_id = context.runId;
            const run_url = `https://github.com/${owner}/${repo}/actions/runs/${run_id}`;
            await github.rest.issues.create({
              owner,
              repo,
              title: ` Workflow failure on run ${run_id}`,
              body: `The [curation workflow](${run_url}) failed. Check the logs for details.`
            });